name: Release

on:
  workflow_run:
    workflows: [Build]
    types: [completed]

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag name
        id: tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts
          merge-multiple: false

      - name: Organize artifacts
        run: |
          mkdir -p release/windows release/macos release/linux

          # Windows
          cp artifacts/X-ReaderPlus-win-x64/*.exe release/windows/ 2>/dev/null || true
          cp artifacts/X-ReaderPlus-win-x86/*.exe release/windows/ 2>/dev/null || true
          cp artifacts/X-ReaderPlus-win-arm64/*.exe release/windows/ 2>/dev/null || true

          # macOS
          cp artifacts/X-ReaderPlus-mac-intel/*.dmg release/macos/ 2>/dev/null || true
          cp artifacts/X-ReaderPlus-mac-apple/*.dmg release/macos/ 2>/dev/null || true

          # Linux
          cp artifacts/X-ReaderPlus-linux-amd64/X-ReaderPlus-linux-amd64 release/linux/ 2>/dev/null || true
          cp artifacts/X-ReaderPlus-linux-arm64/X-ReaderPlus-linux-arm64 release/linux/ 2>/dev/null || true
          cp artifacts/X-ReaderPlus-linux-appimage/*.AppImage release/linux/ 2>/dev/null || true

      - name: Generate release body
        id: body
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          node -e "
            const fs = require('fs');
            const md = fs.readFileSync('CHANGELOG.md', 'utf8');
            const sections = md.split(/^## /m);
            for (const s of sections) {
              if (s.startsWith('v${VERSION}')) {
                fs.writeFileSync('release_body.md', '## ' + s);
                process.exit(0);
              }
            }
            fs.writeFileSync('release_body.md', '## X-ReaderPlus v${VERSION}\\n\\nSee CHANGELOG.md for details.');
          "

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: X-ReaderPlus ${{ steps.tag.outputs.tag }}
          body_path: release_body.md
          files: |
            release/**/*
          draft: false
          prerelease: false
