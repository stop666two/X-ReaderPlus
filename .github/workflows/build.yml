name: Build

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build Go backend
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch == 'x64' && 'amd64' || matrix.arch == 'x86' && '386' || matrix.arch }}
          GOPROXY: https://proxy.golang.org,direct
          GONOSUMCHECK: '*'
          GOFLAGS: -mod=readonly
        run: |
          go mod download
          go build -ldflags="-s -w -H=windowsgui" -o "../dist/X-ReaderPlus-win-${{ matrix.arch}}.exe" .

      - name: Build NSIS installer (x64 only)
        if: matrix.arch == 'x64'
        continue-on-error: true
        run: |
          choco install nsis -y --no-progress 2>$null
          makensis scripts/installer.nsi

      - name: Upload setup (x64)
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-Setup-x64
          path: dist/X-ReaderPlus-Setup-x64.exe

      - name: Upload binary (x64)
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-win-x64
          path: dist/X-ReaderPlus-win-x64.exe

      - name: Upload binary (non-x64)
        if: matrix.arch != 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-win-${{ matrix.arch }}
          path: dist/X-ReaderPlus-win-${{ matrix.arch }}.exe

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build Go backend (arm64 native)
        if: matrix.arch == 'arm64'
        working-directory: backend
        env:
          GOARCH: arm64
          CGO_ENABLED: 1
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download
          go build -ldflags="-s -w" -o "../dist/X-ReaderPlus-mac-arm64" .

      - name: Build Go backend (amd64 headless)
        if: matrix.arch == 'amd64'
        working-directory: backend
        env:
          GOARCH: amd64
          CGO_ENABLED: 0
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download
          go build -ldflags="-s -w" -o "../dist/X-ReaderPlus-mac-amd64" .

      - name: Package .app + .dmg
        run: bash scripts/build-macos.sh "dist/X-ReaderPlus-mac-${{ matrix.arch }}" "${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}
          path: dist/X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}.dmg

  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config librsvg2-bin

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build Go backend (amd64)
        if: matrix.arch == 'amd64'
        working-directory: backend
        env:
          GOARCH: amd64
          CGO_ENABLED: 1
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download
          go build -ldflags="-s -w" -o "../dist/X-ReaderPlus-linux-amd64" .

      - name: Build Go backend (arm64 headless)
        if: matrix.arch == 'arm64'
        working-directory: backend
        env:
          GOARCH: arm64
          CGO_ENABLED: 0
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download
          go build -ldflags="-s -w" -o "../dist/X-ReaderPlus-linux-arm64" .

      - name: Package AppImage (amd64 only)
        if: matrix.arch == 'amd64'
        run: bash scripts/build-linux.sh "dist/X-ReaderPlus-linux-amd64" "x86_64"

      - name: Upload AppImage (amd64)
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-linux-amd64
          path: dist/X-ReaderPlus-linux-x86_64.AppImage

      - name: Upload binary (arm64)
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-linux-arm64
          path: dist/X-ReaderPlus-linux-arm64
