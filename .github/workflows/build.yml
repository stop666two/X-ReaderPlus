name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build:vite
      - run: npx electron-builder --linux --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build:vite
      - run: npx electron-builder --mac --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg

  win-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build:vite
      - run: npx electron-builder --win --x64 --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: win-x64-setup
          path: release/* Setup *.exe
      - uses: actions/upload-artifact@v4
        with:
          name: win-x64-portable
          path: release/*.zip

  win-ia32:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build:vite
      - run: npx electron-builder --win --ia32 --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: win-ia32-setup
          path: release/* Setup *.exe

  win-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run build:vite
      - run: npx electron-builder --win --arm64 --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: win-arm64-setup
          path: release/* Setup *.exe

  release:
    needs: [linux, mac, win-x64, win-ia32, win-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Collect files
        run: |
          mkdir -p dist-release
          find artifacts -type f \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" -o -name "*.zip" \) -exec cp {} dist-release/ \;
          ls -lh dist-release/
      - name: Debug ref
        run: echo "github.ref=${{ github.ref }} ref_name=${{ github.ref_name }}"
      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "$(jq -n \
              --arg tag "${{ github.ref_name }}" \
              --arg name "X-ReaderPlus ${{ github.ref_name }}" \
              --arg body "$(cat RELEASE_NOTES.md)" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')" > /tmp/release.json
          cat /tmp/release.json
          upload_url=$(jq -r '.upload_url' /tmp/release.json | sed 's/{?name,label}//')
          for f in dist-release/*; do
            name=$(basename "$f")
            echo "Uploading $name..."
            curl -s -X POST \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Content-Type: application/octet-stream" \
              "$upload_url?name=$name" \
              --data-binary "@$f"
          done
