name: Build

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Go backend
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch == 'x64' && 'amd64' || matrix.arch == 'x86' && '386' || matrix.arch }}
        run: |
          go mod tidy
          go build -ldflags="-s -w -H=windowsgui" -o "../dist/X-ReaderPlus-win-${{ matrix.arch }}.exe" .
      - uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-win-${{ matrix.arch }}
          path: dist/X-ReaderPlus-win-${{ matrix.arch }}.exe

  build-windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Go backend
        working-directory: backend
        run: |
          go mod tidy
          go build -ldflags="-s -w -H=windowsgui" -o "../dist/X-ReaderPlus.exe" .
      - name: Create portable package
        run: |
          Copy-Item README.md -Destination dist\
          Compress-Archive -Path dist\* -DestinationPath X-ReaderPlus-win-portable.zip
      - uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-win-portable
          path: X-ReaderPlus-win-portable.zip

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Go backend
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch }}
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o "../dist/X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}
          path: dist/X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Build Go backend
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch }}
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o "../dist/X-ReaderPlus-linux-${{ matrix.arch }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-linux-${{ matrix.arch }}
          path: dist/X-ReaderPlus-linux-${{ matrix.arch }}
