name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Go backend
        working-directory: backend
        run: |
          go mod tidy
          go build -ldflags="-s -w -H=windowsgui" -o ../dist/x-reader.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-Windows
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Go backend
        working-directory: backend
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o ../dist/x-reader .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-Linux
          path: dist/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Go backend
        working-directory: backend
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o ../dist/x-reader .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-macOS
          path: dist/

  release:
    needs: [build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Windows
        run: cd artifacts/X-ReaderPlus-Windows && zip -r ../../X-ReaderPlus-Windows.zip .

      - name: Package Linux
        run: cd artifacts/X-ReaderPlus-Linux && tar czf ../../X-ReaderPlus-Linux.tar.gz .

      - name: Package macOS
        run: cd artifacts/X-ReaderPlus-macOS && tar czf ../../X-ReaderPlus-macOS.tar.gz .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            X-ReaderPlus-Windows.zip
            X-ReaderPlus-Linux.tar.gz
            X-ReaderPlus-macOS.tar.gz
