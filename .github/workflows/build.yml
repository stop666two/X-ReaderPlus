name: Build

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:
    branches: [main, master]

jobs:
  # ─── Windows ───────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build Go backend
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch == 'x64' && 'amd64' || matrix.arch == 'x86' && '386' || matrix.arch }}
        run: |
          go mod tidy
          go build -ldflags="-s -w -H=windowsgui" -o "../dist/X-ReaderPlus-win-${{ matrix.arch }}.exe" .

      - name: Build NSIS installer (x64 only)
        if: matrix.arch == 'x64'
        run: |
          choco install nsis -y --no-progress
          $nsis = (Get-ChildItem -Path "C:\Program Files*\NSIS\makensis.exe" -Recurse | Select-Object -First 1).FullName
          & $nsis scripts/installer.nsi

      - name: Upload installer (x64)
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-Setup-x64
          path: dist/X-ReaderPlus-Setup-x64.exe

      - name: Upload binary
        if: matrix.arch != 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-win-${{ matrix.arch }}
          path: dist/X-ReaderPlus-win-${{ matrix.arch }}.exe

  # ─── macOS ────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build Go backend
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o "../dist/X-ReaderPlus-mac-${{ matrix.arch }}" .

      - name: Package .app + .dmg
        run: bash scripts/build-macos.sh "dist/X-ReaderPlus-mac-${{ matrix.arch }}" "${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}
          path: dist/X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}.dmg

  # ─── Linux ────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.0-dev librsvg2-bin

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build Go backend
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: |
          go mod tidy
          go build -ldflags="-s -w" -o "../dist/X-ReaderPlus-linux-${{ matrix.arch }}" .

      - name: Package AppImage
        run: bash scripts/build-linux.sh "dist/X-ReaderPlus-linux-${{ matrix.arch }}" "${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-linux-${{ matrix.arch }}
          path: dist/X-ReaderPlus-linux-${{ matrix.arch }}.AppImage
