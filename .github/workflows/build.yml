name: Build

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build with Wails
        shell: cmd
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch == 'x64' && 'amd64' || matrix.arch == 'x86' && '386' || matrix.arch }}
          CGO_ENABLED: 1
        run: |
          wails build
          if not exist ..\dist mkdir ..\dist
          if exist build\bin\X-ReaderPlus.exe (
            copy /y build\bin\X-ReaderPlus.exe ..\dist\X-ReaderPlus-win-${{ matrix.arch }}.exe >nul
          ) else (
            copy /y build\dist\X-ReaderPlus.exe ..\dist\X-ReaderPlus-win-${{ matrix.arch }}.exe >nul
          )

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-win-${{ matrix.arch }}
          if-no-files-found: error
          path: dist/X-ReaderPlus-win-${{ matrix.arch }}.exe

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build with Wails
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: |
          mkdir -p build/bin ../dist 2>/dev/null
          wails build
          if [ -f build/bin/X-ReaderPlus ]; then
            cp build/bin/X-ReaderPlus ../dist/X-ReaderPlus-mac-${{ matrix.arch }}
          elif [ -f build/dist/X-ReaderPlus ]; then
            cp build/dist/X-ReaderPlus ../dist/X-ReaderPlus-mac-${{ matrix.arch }}
          fi

      - name: Package .app + .dmg
        run: bash scripts/build-macos.sh "dist/X-ReaderPlus-mac-${{ matrix.arch }}" "${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}
          if-no-files-found: error
          path: dist/X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}.dmg

  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - run: npm ci

      - name: Install GTK/WebKit dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config librsvg2-bin

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build with Wails (amd64)
        if: matrix.arch == 'amd64'
        working-directory: backend
        env:
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          mkdir -p build/bin ../dist 2>/dev/null
          wails build
          if [ -f build/bin/X-ReaderPlus ]; then
            cp build/bin/X-ReaderPlus ../dist/X-ReaderPlus-linux-amd64
          elif [ -f build/dist/X-ReaderPlus ]; then
            cp build/dist/X-ReaderPlus ../dist/X-ReaderPlus-linux-amd64
          fi

      - name: Build with Wails (arm64 - native)
        if: matrix.arch == 'arm64'
        runs-on: ubuntu-24.04-arm
        working-directory: backend
        env:
          GOARCH: arm64
          CGO_ENABLED: 1
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config librsvg2-bin
          mkdir -p build/bin ../dist 2>/dev/null
          wails build
          if [ -f build/bin/X-ReaderPlus ]; then
            cp build/bin/X-ReaderPlus ../dist/X-ReaderPlus-linux-arm64
          elif [ -f build/dist/X-ReaderPlus ]; then
            cp build/dist/X-ReaderPlus ../dist/X-ReaderPlus-linux-arm64
          fi

      - name: Package AppImage (amd64)
        if: matrix.arch == 'amd64'
        id: appimage
        run: |
          bash scripts/build-linux.sh "dist/X-ReaderPlus-linux-amd64" "x86_64" || true
          if [ -f "dist/X-ReaderPlus-linux-x86_64.AppImage" ]; then
            echo "appimage_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "appimage_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload binary (amd64)
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-linux-amd64
          if-no-files-found: error
          path: dist/X-ReaderPlus-linux-amd64

      - name: Upload AppImage (amd64)
        if: matrix.arch == 'amd64' && steps.appimage.outputs.appimage_ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-linux-appimage
          if-no-files-found: error
          path: dist/X-ReaderPlus-linux-x86_64.AppImage

      - name: Upload binary (arm64)
        if: matrix.arch == 'arm64'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-linux-arm64
          if-no-files-found: error
          path: dist/X-ReaderPlus-linux-arm64
