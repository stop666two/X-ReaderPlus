name: Build

on:
  push:
    branches: [main, master]
    tags: ['**']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check AGENTS.md not staged
        run: |
          if git ls-files --error-unmatch AGENTS.md 2>/dev/null; then
            echo "::error::AGENTS.md must not be committed!"
            exit 1
          fi
          echo "AGENTS.md check passed"

      - run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Go vet
        working-directory: backend
        run: go vet ./...

  build-windows:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, x86]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build with Wails
        shell: cmd
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch == 'x64' && 'amd64' || matrix.arch == 'x86' && '386' || matrix.arch }}
          CGO_ENABLED: 1
        run: |
          wails build
          if not exist ..\dist mkdir ..\dist
          if exist build\bin\X-ReaderPlus.exe (
            copy /y build\bin\X-ReaderPlus.exe ..\dist\X-ReaderPlus-win-${{ matrix.arch }}.exe >nul
          ) else (
            copy /y build\dist\X-ReaderPlus.exe ..\dist\X-ReaderPlus-win-${{ matrix.arch }}.exe >nul
          )

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-win-${{ matrix.arch }}
          if-no-files-found: error
          path: dist/X-ReaderPlus-win-${{ matrix.arch }}.exe

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build with Wails
        working-directory: backend
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          mkdir -p build/bin ../dist 2>/dev/null
          wails build

      - name: Package .dmg
        run: |
          # Find binary: check common Wails output locations
          BIN=""
          for p in backend/build/bin/X-ReaderPlus backend/build/dist/X-ReaderPlus; do
            if [ -f "$p" ]; then BIN="$p"; break; fi
          done
          if [ -z "$BIN" ]; then
            # Try find as last resort
            BIN=$(find backend/build -name "X-ReaderPlus*" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$BIN" ]; then
            echo "::error::Binary not found after wails build"
            ls -la backend/build/ 2>/dev/null || true
            exit 1
          fi
          echo "Binary found: $BIN"
          bash scripts/build-macos.sh "$BIN" "${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}"

      - uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}
          if-no-files-found: error
          path: dist/X-ReaderPlus-mac-${{ matrix.arch == 'amd64' && 'intel' || 'apple' }}.dmg

  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - run: npm ci

      - name: Install GTK/WebKit dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.0-dev pkg-config librsvg2-bin

      - name: Build frontend
        run: npm run build

      - name: Copy frontend for embed
        run: node scripts/copy-frontend.js

      - name: Build with Wails
        working-directory: backend
        env:
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          mkdir -p build/bin ../dist 2>/dev/null
          wails build
          if [ -f build/bin/X-ReaderPlus ]; then
            cp build/bin/X-ReaderPlus ../dist/X-ReaderPlus-linux-amd64
          elif [ -f build/dist/X-ReaderPlus ]; then
            cp build/dist/X-ReaderPlus ../dist/X-ReaderPlus-linux-amd64
          fi

      - name: Package AppImage
        if: matrix.arch == 'amd64'
        id: appimage
        run: |
          bash scripts/build-linux.sh "dist/X-ReaderPlus-linux-amd64" "x86_64" || true
          if [ -f "dist/X-ReaderPlus-linux-x86_64.AppImage" ]; then
            echo "appimage_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "appimage_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload binary
        if: matrix.arch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-linux-amd64
          if-no-files-found: error
          path: dist/X-ReaderPlus-linux-amd64

      - name: Upload AppImage
        if: matrix.arch == 'amd64' && steps.appimage.outputs.appimage_ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: X-ReaderPlus-linux-appimage
          if-no-files-found: error
          path: dist/X-ReaderPlus-linux-x86_64.AppImage

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false
      - name: Organize
        run: |
          mkdir -p release/windows release/macos release/linux
          for d in artifacts/X-ReaderPlus-win-*; do cp "$d"/*.exe release/windows/ 2>/dev/null || true; done
          for d in artifacts/X-ReaderPlus-mac-*; do cp "$d"/*.dmg release/macos/ 2>/dev/null || true; done
          cp artifacts/X-ReaderPlus-linux-amd64/* release/linux/ 2>/dev/null || true
          cp artifacts/X-ReaderPlus-linux-appimage/*.AppImage release/linux/ 2>/dev/null || true
      - name: Generate release body
        run: |
          cp CHANGELOG.md release_body.md
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: X-ReaderPlus ${{ github.ref_name }}
          body_path: release_body.md
          files: release/**/*
          draft: false
          prerelease: false
