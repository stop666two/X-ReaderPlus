name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  # ═══════════════════ Windows ═══════════════════

  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5; with: { go-version: '1.23' }
      - uses: actions/setup-node@v4; with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Build
        working-directory: backend
        run: go build -ldflags="-s -w -H=windowsgui" -o ../dist/X-ReaderPlus-win-x64.exe .
      - uses: actions/upload-artifact@v4
        with: { name: X-ReaderPlus-win-x64, path: dist/X-ReaderPlus-win-x64.exe }

  build-windows-x86:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5; with: { go-version: '1.23' }
      - uses: actions/setup-node@v4; with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Build
        working-directory: backend
        env: { GOARCH: '386' }
        run: go build -ldflags="-s -w -H=windowsgui" -o ../dist/X-ReaderPlus-win-x86.exe .
      - uses: actions/upload-artifact@v4
        with: { name: X-ReaderPlus-win-x86, path: dist/X-ReaderPlus-win-x86.exe }

  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5; with: { go-version: '1.23' }
      - uses: actions/setup-node@v4; with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Build
        working-directory: backend
        env: { GOARCH: arm64 }
        run: go build -ldflags="-s -w -H=windowsgui" -o ../dist/X-ReaderPlus-win-arm64.exe .
      - uses: actions/upload-artifact@v4
        with: { name: X-ReaderPlus-win-arm64, path: dist/X-ReaderPlus-win-arm64.exe }

  build-windows-portable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5; with: { go-version: '1.23' }
      - uses: actions/setup-node@v4; with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Build
        working-directory: backend
        run: go build -ldflags="-s -w -H=windowsgui" -o ../dist/X-ReaderPlus.exe .
      - name: Package
        run: |
          copy README.md dist\
          Compress-Archive -Path dist\* -DestinationPath X-ReaderPlus-win-portable.zip
      - uses: actions/upload-artifact@v4
        with: { name: X-ReaderPlus-win-portable, path: X-ReaderPlus-win-portable.zip }

  # ═══════════════════ macOS ═══════════════════

  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5; with: { go-version: '1.23' }
      - uses: actions/setup-node@v4; with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Build
        working-directory: backend
        run: go build -ldflags="-s -w" -o ../dist/X-ReaderPlus-mac-intel .
      - uses: actions/upload-artifact@v4
        with: { name: X-ReaderPlus-mac-intel, path: dist/X-ReaderPlus-mac-intel }

  build-macos-apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5; with: { go-version: '1.23' }
      - uses: actions/setup-node@v4; with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Build
        working-directory: backend
        env: { GOARCH: arm64 }
        run: go build -ldflags="-s -w" -o ../dist/X-ReaderPlus-mac-apple .
      - uses: actions/upload-artifact@v4
        with: { name: X-ReaderPlus-mac-apple, path: dist/X-ReaderPlus-mac-apple }

  # ═══════════════════ Linux ═══════════════════

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5; with: { go-version: '1.23' }
      - uses: actions/setup-node@v4; with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Build
        working-directory: backend
        run: go build -ldflags="-s -w" -o ../dist/X-ReaderPlus-linux-x64 .
      - uses: actions/upload-artifact@v4
        with: { name: X-ReaderPlus-linux-x64, path: dist/X-ReaderPlus-linux-x64 }

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5; with: { go-version: '1.23' }
      - uses: actions/setup-node@v4; with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - name: Build
        working-directory: backend
        env: { GOARCH: arm64 }
        run: go build -ldflags="-s -w" -o ../dist/X-ReaderPlus-linux-arm64 .
      - uses: actions/upload-artifact@v4
        with: { name: X-ReaderPlus-linux-arm64, path: dist/X-ReaderPlus-linux-arm64 }

  # ═══════════════════ Release ═══════════════════

  release:
    needs:
      - build-windows-amd64
      - build-windows-x86
      - build-windows-arm64
      - build-windows-portable
      - build-macos-intel
      - build-macos-apple
      - build-linux-x64
      - build-linux-arm64
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: release-assets/*
