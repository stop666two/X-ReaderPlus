name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:vite
      - run: npx electron-builder --linux --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: Linux-AppImage
          path: release/*.AppImage

  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:vite
      - run: npx electron-builder --mac --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: release/*.dmg

  win-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:vite
      - run: npx electron-builder --win --x64 --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: Windows-x64-安装版
          path: release/*Setup*.exe
      - uses: actions/upload-artifact@v4
        with:
          name: Windows-x64-便携版
          path: release/*.zip

  win-ia32:
    continue-on-error: true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:vite
      - run: npx electron-builder --win --ia32 --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: Windows-32位-安装版
          path: release/*Setup*.exe

  win-arm64:
    continue-on-error: true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:vite
      - run: npx electron-builder --win --arm64 --publish=never
      - uses: actions/upload-artifact@v4
        with:
          name: Windows-ARM-安装版
          path: release/*Setup*.exe

  release:
    needs: [linux, mac, win-x64, win-ia32, win-arm64]
    if: success() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: |
          mkdir -p dist-release
          find artifacts -type f \( -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" -o -name "*.zip" \) -exec cp {} dist-release/ \;
          ls -lh dist-release/
      - run: |
          gh release create "${{ github.ref_name }}" \
            --title "X-ReaderPlus ${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            dist-release/*
        env:
          GH_TOKEN: ${{ github.token }}
