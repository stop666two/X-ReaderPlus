<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(70,60)" fill="none" stroke="#fff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M0,40 L0,360 Q90,340 185,360 L185,40 Q90,20 0,40Z" fill="#fff" fill-opacity="0.95"/>
    <!-- Right page -->
    <path d="M185,40 L185,360 Q280,340 370,360 L370,40 Q280,20 185,40Z" fill="#fff" fill-opacity="0.85"/>
    <!-- Spine line -->
    <line x1="185" y1="40" x2="185" y2="360" stroke="#1565C0" stroke-width="6"/>
    <!-- Text lines left -->
    <line x1="40" y1="100" x2="160" y2="100" stroke="#1565C0" stroke-width="6" opacity="0.3"/>
    <line x1="40" y1="140" x2="140" y2="140" stroke="#1565C0" stroke-width="6" opacity="0.2"/>
    <line x1="40" y1="180" x2="150" y2="180" stroke="#1565C0" stroke-width="6" opacity="0.3"/>
    <!-- Text lines right -->
    <line x1="210" y1="100" x2="340" y2="100" stroke="#1565C0" stroke-width="6" opacity="0.2"/>
    <line x1="210" y1="140" x2="320" y2="140" stroke="#1565C0" stroke-width="6" opacity="0.3"/>
    <line x1="210" y1="180" x2="340" y2="180" stroke="#1565C0" stroke-width="6" opacity="0.2"/>
  </g>
  <!-- Red bookmark -->
  <polygon points="248,56 248,160 220,136 192,160 192,56" fill="#FF5252"/>
</svg>
