<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book spine -->
  <rect x="96" y="80" width="320" height="352" rx="8" fill="#FFF" opacity="0.95"/>
  <rect x="116" y="80" width="24" height="352" rx="4" fill="#1565C0"/>
  <!-- Text lines on page -->
  <rect x="160" y="120" width="200" height="8" rx="4" fill="#333" opacity="0.7"/>
  <rect x="160" y="148" width="220" height="8" rx="4" fill="#333" opacity="0.5"/>
  <rect x="160" y="176" width="180" height="8" rx="4" fill="#333" opacity="0.5"/>
  <rect x="160" y="204" width="200" height="8" rx="4" fill="#333" opacity="0.5"/>
  <rect x="160" y="232" width="160" height="8" rx="4" fill="#333" opacity="0.5"/>
  <!-- X letter mark -->
  <g transform="translate(370, 360)" opacity="0.9">
    <rect x="0" y="0" width="48" height="52" rx="8" fill="#E53935" transform="rotate(12)"/>
    <text x="10" y="38" font-family="Arial Black,sans-serif" font-size="32" font-weight="900" fill="#FFF">X</text>
  </g>
  <!-- Reading glow accent -->
  <circle cx="420" cy="100" r="40" fill="#42A5F5" opacity="0.3"/>
  <circle cx="420" cy="100" r="20" fill="#42A5F5" opacity="0.5"/>
</svg>
