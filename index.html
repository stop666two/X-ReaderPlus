<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP notes:
      - script-src 'unsafe-inline': required by Vue template compiler and Vuetify for dynamic runtime style injection.
      - style-src 'unsafe-inline' https://cdn.jsdelivr.net: Vuetify loads webfonts from CDN; inline is used
        by Vue SFC <style> blocks compiled into JS.
      - object-src 'none': disables Flash/ActiveX plugins.
      - frame-ancestors 'none': prevents clickjacking by blocking all framing.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob:; media-src 'self'; connect-src 'self' https://api.dictionaryapi.dev; worker-src 'self' blob:; child-src blob:; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; object-src 'none'"
    />
    <title>X-ReaderPlus</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
